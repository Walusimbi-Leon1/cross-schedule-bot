name: Cross-Schedule Bot

on:
  # Check for due posts every 15 minutes
  schedule:
    - cron: "*/15 * * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no posting)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Write Firebase service account to file (avoids YAML multiline issues)
      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-key.json

      - name: Run schedule checker
        run: node src/index.js
        env:
          # Firebase
          FIREBASE_SERVICE_ACCOUNT_PATH: firebase-key.json
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

          # Mastodon
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}

          # Bluesky
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}

          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

          # Runtime
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
